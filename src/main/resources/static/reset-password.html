<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelDiary — Сброс пароля</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/pages/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-hero">
      <div class="auth-hero__content">
        <div class="auth-hero__logo">🗺️</div>
        <h1 class="auth-hero__title">TravelDiary</h1>
        <p class="auth-hero__subtitle">
          Верните доступ к дневнику путешествий и продолжайте сохранять маршруты, места и воспоминания.
        </p>
      </div>
    </div>

    <div class="auth-panel">
      <div class="auth-form-wrapper">
        <form id="resetPasswordForm" class="auth-form" novalidate>
          <h2 class="auth-form__title">Сброс пароля</h2>
          <p class="auth-form__subtitle">Введите новый пароль для аккаунта</p>

          <div class="form-group mt-6">
            <label class="form-label" for="newPassword">Новый пароль</label>
            <div class="input-password-wrapper">
              <input
                type="password"
                id="newPassword"
                class="form-input"
                autocomplete="new-password"
                placeholder="Минимум 8 символов"
                required
              />
              <button type="button" class="password-toggle" data-target="newPassword">👁</button>
            </div>
            <span class="form-error" id="newPasswordError"></span>
          </div>

          <div class="form-group mt-4">
            <label class="form-label" for="confirmPassword">Повторите пароль</label>
            <input
              type="password"
              id="confirmPassword"
              class="form-input"
              autocomplete="new-password"
              placeholder="••••••••"
              required
            />
            <span class="form-error" id="confirmPasswordError"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg mt-6" id="resetPasswordBtn" style="width: 100%">
            Сохранить пароль
          </button>

          <div id="resetPasswordMessage" class="auth-error" style="display: none"></div>
          <a href="/index.html" class="btn btn-secondary btn-lg mt-4" style="width: 100%">Вернуться ко входу</a>
        </form>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/pages/reset-password.js"></script>
  </body>
</html>
