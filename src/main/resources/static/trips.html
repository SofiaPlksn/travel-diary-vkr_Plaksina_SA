<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelDiary — Мои поездки</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/pages/trips.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-content">
        <div class="page-header flex justify-between items-center mb-6">
          <div>
            <h1>Мои поездки</h1>
            <p class="text-secondary text-sm mt-2" id="tripsCount">
              Загрузка...
            </p>
          </div>
          <a href="/trip-create.html" class="btn btn-primary">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Новая поездка
          </a>
        </div>

        <div class="trips-filters card card-body mb-6">
          <div class="flex gap-4 items-center" style="flex-wrap: wrap">

            <div class="search-wrapper">
              <span class="search-icon">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </span>
              <input
                type="text"
                id="searchInput"
                class="form-input search-input"
                placeholder="Поиск по названию или стране..."
              />
            </div>

            <select id="statusFilter" class="form-select filter-select">
              <option value="">Все статусы</option>
              <option value="PLANNED">🗓 Запланированные</option>
              <option value="ACTIVE">🚀 Активные</option>
              <option value="COMPLETED">✅ Завершённые</option>
            </select>

            <select id="yearFilter" class="form-select filter-select">
              <option value="">Все годы</option>
            </select>

            <select id="sortSelect" class="form-select filter-select">
              <option value="startDate,desc">Сначала новые</option>
              <option value="startDate,asc">Сначала старые</option>
              <option value="title,asc">По названию А-Я</option>
            </select>

            <div class="view-toggle">
              <button
                class="btn btn-ghost btn-icon active"
                id="viewGrid"
                title="Сетка"
              >
                ⊞
              </button>
              <button
                class="btn btn-ghost btn-icon"
                id="viewList"
                title="Список"
              >
                ☰
              </button>
            </div>
          </div>
        </div>

        <div id="tripsContent">

          <div class="grid grid-3" id="skeletonGrid">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
          </div>

          <div class="grid grid-3" id="tripsGrid" style="display: none"></div>

          <div id="tripsList" style="display: none"></div>

          <div id="emptyState" class="empty-state" style="display: none">
            <span class="empty-state__icon">✈️</span>
            <p class="empty-state__title">Пока нет поездок</p>
            <p class="empty-state__text">
              Создайте свою первую поездку и начните вести дневник путешествий
            </p>
            <a href="/trip-create.html" class="btn btn-primary btn-lg">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Создать первую поездку
            </a>
          </div>
        </div>

        <div
          class="pagination flex justify-center gap-2 mt-8"
          id="pagination"
          style="display: none"
        ></div>
      </main>
    </div>

    <div class="modal-overlay" id="deleteModal">
      <div class="modal" style="max-width: 400px">
        <div class="modal-header">
          <h3>Удалить поездку?</h3>
          <button class="btn-ghost btn-icon" id="closeDeleteModal">✕</button>
        </div>
        <div class="modal-body">
          <p class="text-secondary">
            Вы уверены, что хотите удалить поездку
            <strong id="deleteTripName"></strong>? <br /><br />
            Все фотографии, места и записи дневника будут удалены безвозвратно.
          </p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelDelete">Отмена</button>
          <button class="btn btn-danger" id="confirmDelete">Удалить</button>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/pages/trips.js"></script>
  </body>
</html>
