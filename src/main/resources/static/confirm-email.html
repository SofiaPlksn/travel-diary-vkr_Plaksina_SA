<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelDiary — Подтверждение email</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/pages/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-hero">
      <div class="auth-hero__content">
        <div class="auth-hero__logo">🗺️</div>
        <h1 class="auth-hero__title">TravelDiary</h1>
        <p class="auth-hero__subtitle">
          Подтвердите email, чтобы профиль показывал актуальный статус аккаунта.
        </p>
      </div>
    </div>

    <div class="auth-panel">
      <div class="auth-form-wrapper">
        <div class="auth-form">
          <h2 class="auth-form__title">Подтверждение email</h2>
          <p class="auth-form__subtitle" id="confirmEmailText">Проверяем ссылку подтверждения...</p>
          <div id="confirmEmailMessage" class="auth-error mt-6" style="display: none"></div>
          <a href="/trips.html" class="btn btn-primary btn-lg mt-6" id="confirmEmailTripsBtn" style="display: none; width: 100%">
            Перейти к поездкам
          </a>
          <a href="/index.html" class="btn btn-secondary btn-lg mt-4" style="width: 100%">На страницу входа</a>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/confirm-email.js"></script>
  </body>
</html>
