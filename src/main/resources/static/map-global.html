<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelDiary — Карта мира</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/pages/map-global.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main
        class="main-content"
        style="padding: 0; overflow: hidden; position: relative"
      >
        <div id="map" style="width: 100%; height: 100%"></div>
        <div class="map-overlay">
          <div class="card card-body">
            <h2 class="text-lg font-bold mb-2">Обзор путешествий</h2>
            <p class="text-secondary text-sm mb-4">
              Здесь собраны все ваши отметки и медиафайлы с привязкой к
              местности.
            </p>

            <div class="map-legend">
              <div class="legend-item">
                <span
                  class="legend-dot"
                  style="
                    background: rgba(99, 102, 241, 0.6);
                    box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
                  "
                ></span>
                <span>Тепловой след (активность)</span>
              </div>
              <div class="legend-item">
                <span class="legend-icon">📍</span>
                <span>Места посещения</span>
              </div>
              <div class="legend-item">
                <span class="legend-icon">📸</span>
                <span>Медиафайлы</span>
              </div>
            </div>

            <div class="mt-4 pt-4 border-t border-slate-200">
              <div class="flex items-center justify-between mb-4">
                <span class="text-sm">Всего точек:</span>
                <span id="pointsCount" class="font-bold">...</span>
              </div>
              <button
                id="toggleRadarBtn"
                class="btn btn-secondary w-full"
                style="justify-content: center"
              >
                🌧 Показать радар осадков
              </button>
            </div>
          </div>
        </div>

        <div id="mapLoader" class="map-loader">
          <div class="spinner"></div>
          <p>Загружаем ваши приключения...</p>
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/pages/map-global.js"></script>
  </body>
</html>
