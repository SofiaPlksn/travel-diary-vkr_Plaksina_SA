server.port=8081

spring.application.name=travel-diary

spring.datasource.url=jdbc:postgresql://localhost:5433/travel_diary
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1

spring.cache.type=redis
spring.cache.redis.time-to-live=10800000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

redis.ttl.weather-cache=10800
redis.ttl.password-reset=3600
redis.ttl.email-confirm=86400

file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

logging.level.com.traveldiary=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.io.lettuce=WARN
logging.charset.console=UTF-8

springdoc.swagger-ui.with-credentials=true
springdoc.swagger-ui.csrf.enabled=true
springdoc.swagger-ui.csrf.cookie-name=XSRF-TOKEN
springdoc.swagger-ui.csrf.header-name=X-XSRF-TOKEN
