services:
  db:
    image: postgres:15-alpine
    container_name: travel_diary_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: travel_diary
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d travel_diary" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel_diary_net

  redis:
    image: redis:7-alpine
    container_name: travel_diary_redis
    restart: unless-stopped
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - travel_diary_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel_diary_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/travel_diary
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET}

      FILE_UPLOAD_DIR: /app/uploads
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8081:8081"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - travel_diary_net
    profiles:
      - prod

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: travel_diary_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@traveldiary.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - travel_diary_net
    profiles:
      - dev

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: travel_diary_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - travel_diary_net
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  travel_diary_net:
    driver: bridge
